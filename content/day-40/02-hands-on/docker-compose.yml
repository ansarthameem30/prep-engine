version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Docker Compose for Local Development
# Start everything: docker compose up --build
# Stop + remove volumes: docker compose down -v
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      target: builder        # Use builder stage (includes devDependencies for ts-node-dev)
    image: my-express-app:dev
    container_name: myapp-dev
    ports:
      - "3000:3000"
      - "9229:9229"          # Node.js debugger port
    volumes:
      - ./src:/app/src        # Mount source for hot reload
      - ./tsconfig.json:/app/tsconfig.json
      # Exclude node_modules from mount — use container's node_modules
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://myapp:devpassword@db:5432/myapp_dev
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-not-for-production
    env_file:
      - .env.local            # Local overrides (gitignored)
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run dev       # Starts ts-node-dev with watch mode
    restart: unless-stopped
    networks:
      - app-network
    # Resource limits to prevent runaway dev containers
    deploy:
      resources:
        limits:
          memory: 512M

  # ─── PostgreSQL Database ─────────────────────────────────────────────────────
  db:
    image: postgres:16.2-alpine
    container_name: myapp-postgres
    ports:
      - "5432:5432"           # Expose for local DB clients (DBeaver, pgAdmin)
    environment:
      POSTGRES_DB: myapp_dev
      POSTGRES_USER: myapp
      POSTGRES_PASSWORD: devpassword
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persist DB data between restarts
      - ./db/init:/docker-entrypoint-initdb.d    # Run .sql files on first startup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myapp -d myapp_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app-network
    restart: unless-stopped

  # ─── Redis Cache ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: myapp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ─── Redis Commander (optional GUI) ──────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: myapp-redis-ui
    environment:
      REDIS_HOSTS: "local:redis:6379"
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - app-network
    profiles:
      - tools    # Only start with: docker compose --profile tools up

  # ─── Mailhog (email testing) ──────────────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: myapp-mailhog
    ports:
      - "1025:1025"    # SMTP server (configure app to send emails here)
      - "8025:8025"    # Web UI to view sent emails
    networks:
      - app-network
    profiles:
      - tools

# ─────────────────────────────────────────────────────────────────────────────
# Named Volumes — persist data between container restarts
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Networks — isolate app services from each other
# ─────────────────────────────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
