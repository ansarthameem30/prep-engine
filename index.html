<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Prep Engine — interactive 60-day interview prep with lessons, code files, progress tracking, and analytics." />
    <meta name="theme-color" content="#7c5cfc" />
    <meta name="application-name" content="Prep Engine" />
    <meta property="og:title" content="Prep Engine" />
    <meta property="og:description" content="60-day interview prep platform with dynamic lessons and progress tracking." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&display=swap"
      rel="stylesheet"
    />
    <title>Prep Engine</title>
    <!-- Apply persisted (or default dark) theme before paint to avoid a flash. -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('prep-engine-settings')
          var state = raw ? JSON.parse(raw).state || {} : {}
          var theme = state.theme || 'dark'
          var accent = state.accent || 'violet'
          var dark =
            theme === 'dark' ||
            (theme === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
          document.documentElement.setAttribute('data-accent', accent)
        } catch (e) {
          document.documentElement.classList.add('dark')
          document.documentElement.setAttribute('data-accent', 'violet')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
